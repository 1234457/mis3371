<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thank You - Gavin Medical Group</title>
    <link rel="stylesheet" href="style.css">
    <script defer>
        document.addEventListener("DOMContentLoaded", function () {
            const frame = document.getElementById("headerFrame");

            frame.addEventListener("load", function () {
                try {
                    const doc = frame.contentDocument || frame.contentWindow.document;
                    const todayEl = doc.getElementById("today");

                    if (todayEl) {
                        const d = new Date();
                        todayEl.textContent =
                            "Today is: " + d.toLocaleDateString(undefined, {
                                weekday: "long",
                                year: "numeric",
                                month: "long",
                                day: "numeric"
                            });
                    }
                } catch (e) {
                    console.log("Could not access iframe content.");
                }
            });
        });
    </script>
</head>
<body>

    <iframe src="header.html" id="headerFrame" title="Header"></iframe>

    <div id="main">
        <div id="reviewArea" style="text-align:center;">
            <h2>Thank you for your submission.</h2>
            <p>Our office will review your registration information.</p>
            <p>We will be contacting you shortly.</p>
        </div>
    </div>

    <div id="footer">
        <div class="footer-left">
            <strong>Gavin Medical Group</strong><br>
            4750 Calhoun Rd<br>
            Houston, TX 77004
        </div>

        <div class="footer-center">
            <button type="button" onclick="alert('Contact us at info@gavinmedical.com');">
                CONTACT US
            </button>
        </div>

        <div class="footer-right">
            <a href="https://www.facebook.com" target="_blank">Facebook</a> |
            <a href="https://www.twitter.com" target="_blank">Twitter</a>
        </div>
    </div>

</body>
</html>
